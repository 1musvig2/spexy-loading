<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Spexy Development">
    <title>Spexy Loading Screen</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- spexy-loading v1.1.0 | Modern & Minimalist -->
    <!-- QBCore & QBox Compatible -->
</head>
<body>

    <!-- ═══════════════════════════════════════
         BACKGROUND LAYER
    ═══════════════════════════════════════ -->
    <div id="spexy-bg"></div>

    <!-- ═══════════════════════════════════════
         ALWAYS-VISIBLE TOP-LEFT BAR
    ═══════════════════════════════════════ -->
    <div id="spexy-topbar">

        <!-- Toggle Button -->
        <button id="spexy-panel-toggle" title="Menü">
            <span class="toggle-bar"></span>
            <span class="toggle-bar"></span>
            <span class="toggle-bar"></span>
        </button>

        <!-- Online Badge (always visible) -->
        <div id="spexy-online-badge">
            <span class="online-dot"></span>
            <span id="spexy-player-count">—</span>
            <span id="spexy-player-max">/64</span>
            <span id="spexy-players-label">çevrimiçi</span>
        </div>

    </div>

    <!-- ═══════════════════════════════════════
         LEFT SLIDE PANEL (açılır/kapanır)
    ═══════════════════════════════════════ -->
    <div id="spexy-backdrop"></div>

    <aside id="spexy-left">

        <div class="panel-inner">

            <!-- Discord Profile -->
            <div id="spexy-profile">
                <img id="spexy-discord-avatar"
                     src="https://cdn.discordapp.com/embed/avatars/0.png"
                     alt="Avatar"
                     onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                <div class="profile-info">
                    <div class="profile-badge">
                        <span class="profile-badge-dot"></span>
                        Discord
                    </div>
                    <div id="spexy-discord-name">—</div>
                    <div id="spexy-discord-tag">#0000</div>
                </div>
            </div>

            <div class="panel-divider"></div>

            <!-- Rules -->
            <div class="spexy-rules-section">
                <div class="rules-header">
                    <div class="rules-line"></div>
                    <span id="spexy-rules-title">Sunucu Kuralları</span>
                    <div class="rules-line"></div>
                </div>
                <ul id="spexy-rules-list"></ul>
            </div>

            <div class="panel-divider"></div>

            <!-- Bottom -->
            <div class="spexy-bottom-section">

                <a id="spexy-discord-btn" href="#" target="_blank" rel="noopener">
                    <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 13.99 13.99 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
                    </svg>
                    <span class="social-label">discord.gg/spexy</span>
                    <span class="social-arrow">→</span>
                </a>

                <div class="spexy-footer">
                    <span class="spexy-brand">SPEXY</span>
                    <span id="spexy-version">v1.1.0</span>
                </div>

            </div>
        </div>
    </aside>

    <!-- ═══════════════════════════════════════
         CENTER: Server Identity + Loading
    ═══════════════════════════════════════ -->
    <main id="spexy-center">

        <div class="spexy-server-identity">
            <div class="spexy-logo-wrapper">
                <img id="spexy-logo"
                     src="assets/img/logo.png"
                     alt="Spexy Logo"
                     onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'spexy-logo-placeholder\'>S</span>'">
            </div>
            <div id="spexy-server-name">SPEXY ROLEPLAY</div>
        </div>

        <div class="spexy-loading-core">
            <div class="spexy-bar-header">
                <span id="spexy-loading-label">Yükleniyor</span>
                <span id="spexy-bar-percent">0%</span>
            </div>
            <div class="spexy-bar-track">
                <div id="spexy-bar-fill"></div>
            </div>
            <span id="spexy-connecting">Bağlanılıyor...</span>
        </div>

        <div class="spexy-tip-box">
            <span id="spexy-tip-label">İpucu</span>
            <span id="spexy-tip-text">Yükleniyor...</span>
        </div>

    </main>

    <!-- ─── MUSIC BUTTON ─────────────────────── -->
    <button id="spexy-music-btn" title="Müzik">
        <span class="music-icon">♪</span>
    </button>

    <!-- ─── MUSIC VOLUME CONTROL ─────────────────────── -->
    <div id="spexy-volume-control">
        <input type="range" id="spexy-volume-slider" min="0" max="100" value="30">
        <span id="spexy-volume-value">30%</span>
    </div>

    <!-- ─── SOCIAL BUTTONS ─────────────────────── -->
    <div id="spexy-socials">
        <a id="spexy-discord-social" href="#" target="_blank" rel="noopener" title="Discord">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 13.99 13.99 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
        </a>
        <a id="spexy-youtube-social" href="#" target="_blank" rel="noopener" title="YouTube">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
        </a>
        <a id="spexy-github-social" href="#" target="_blank" rel="noopener" title="GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
        </a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
